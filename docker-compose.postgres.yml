# OpenSyncCRDT — single node, Postgres storage.
#
# One server process backed by a Postgres database. The schema is created
# automatically on first start.
#
#   docker compose -f docker-compose.postgres.yml up
#
# Switching from SQLite to Postgres is only these two environment variables
# (STORAGE_BACKEND and STORAGE_URL) — no code changes.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opensync
      POSTGRES_PASSWORD: opensync
      POSTGRES_DB: opensynccrdt
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensync -d opensynccrdt"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  opensynccrdt:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: opensynccrdt/server:latest
    ports:
      - "8080:8080"
    environment:
      STORAGE_BACKEND: postgres
      STORAGE_URL: postgres://opensync:opensync@postgres:5432/opensynccrdt
      STORAGE_POSTGRES_SSL_MODE: disable
      LOG_FORMAT: json
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
