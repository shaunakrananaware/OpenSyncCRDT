# Weekly security scanning: Go vulnerability database (govulncheck), dependency
# CVE scan (nancy), and Docker image scan (Trivy). Also runnable on demand.
name: Security

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  nancy:
    name: nancy (dependency CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Produce dependency list
        run: go list -json -deps ./... > deps.json
      - name: Scan with nancy
        uses: sonatype-nexus-community/nancy-github-action@main
        with:
          goListJsonPath: deps.json

  trivy:
    name: Trivy (Docker image scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          load: true
          tags: opensynccrdt/server:scan
          build-args: VERSION=scan
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: opensynccrdt/server:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
