# nginx load balancer for the OpenSyncCRDT cluster demo.
#
# WebSocket connections must use sticky sessions so a client stays pinned to
# one node for the life of its connection. `ip_hash` provides that affinity
# here; in production behind a real load balancer use cookie-based affinity
# (e.g. the nginx ingress annotation nginx.ingress.kubernetes.io/affinity:
# cookie). Cross-node fan-out of operations is handled by Redis pub/sub, so a
# client on node1 still receives operations produced by a client on node2.

events {}

http {
    upstream opensynccrdt_nodes {
        ip_hash;
        server node1:8080;
        server node2:8080;
    }

    # Map the Upgrade header through for WebSocket connections.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        location / {
            proxy_pass         http://opensynccrdt_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket connections are long-lived; don't time them out.
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }
}
