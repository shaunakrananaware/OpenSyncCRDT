apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensynccrdt.fullname" . }}
  labels:
    {{- include "opensynccrdt.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "opensynccrdt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opensynccrdt.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when config or secrets change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: opensynccrdt
          image: {{ include "opensynccrdt.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
          envFrom:
            - configMapRef:
                name: {{ include "opensynccrdt.fullname" . }}
            - secretRef:
                name: {{ include "opensynccrdt.fullname" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if eq (include "opensynccrdt.usePersistence" .) "true" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if eq (include "opensynccrdt.usePersistence" .) "true" }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "opensynccrdt.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
