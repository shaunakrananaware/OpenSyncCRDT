apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opensynccrdt.fullname" . }}
  labels:
    {{- include "opensynccrdt.labels" . | nindent 4 }}
data:
  HOST: {{ .Values.server.host | quote }}
  PORT: {{ .Values.server.port | quote }}
  LOG_LEVEL: {{ .Values.server.logLevel | quote }}
  LOG_FORMAT: {{ .Values.server.logFormat | quote }}
  DATA_DIR: "/data"

  STORAGE_BACKEND: {{ .Values.storage.backend | quote }}
  STORAGE_SNAPSHOT_INTERVAL: {{ .Values.storage.snapshotInterval | quote }}
  STORAGE_POSTGRES_MAX_CONNS: {{ .Values.storage.postgres.maxConns | quote }}
  STORAGE_POSTGRES_SSL_MODE: {{ .Values.storage.postgres.sslMode | quote }}
  STORAGE_MYSQL_MAX_CONNS: {{ .Values.storage.mysql.maxConns | quote }}

  AUTH_MODE: {{ .Values.auth.mode | quote }}
  AUTH_HEADER_NAME: {{ .Values.auth.headerName | quote }}
  {{- if .Values.auth.webhookUrl }}
  AUTH_WEBHOOK_URL: {{ .Values.auth.webhookUrl | quote }}
  {{- end }}
  AUTH_WEBHOOK_TIMEOUT: {{ .Values.auth.webhookTimeout | quote }}
  AUTH_WEBHOOK_CACHE_TTL: {{ .Values.auth.webhookCacheTtl | quote }}

  {{- with .Values.webhooks }}
  WEBHOOK_TIMEOUT: {{ .timeout | quote }}
  WEBHOOK_MAX_RETRIES: {{ .maxRetries | quote }}
  {{- if .onDocumentCreated }}
  WEBHOOK_ON_DOCUMENT_CREATED_URL: {{ .onDocumentCreated | quote }}
  {{- end }}
  {{- if .onDocumentUpdated }}
  WEBHOOK_ON_DOCUMENT_UPDATED_URL: {{ .onDocumentUpdated | quote }}
  {{- end }}
  {{- if .onDocumentDeleted }}
  WEBHOOK_ON_DOCUMENT_DELETED_URL: {{ .onDocumentDeleted | quote }}
  {{- end }}
  {{- if .onClientConnected }}
  WEBHOOK_ON_CLIENT_CONNECTED_URL: {{ .onClientConnected | quote }}
  {{- end }}
  {{- if .onClientDisconnected }}
  WEBHOOK_ON_CLIENT_DISCONNECTED_URL: {{ .onClientDisconnected | quote }}
  {{- end }}
  {{- if .onSyncError }}
  WEBHOOK_ON_SYNC_ERROR_URL: {{ .onSyncError | quote }}
  {{- end }}
  {{- end }}

  {{- if .Values.conflictResolver.url }}
  CONFLICT_RESOLVER_URL: {{ .Values.conflictResolver.url | quote }}
  CONFLICT_RESOLVER_TIMEOUT: {{ .Values.conflictResolver.timeout | quote }}
  {{- end }}

  CLUSTER_MODE: {{ .Values.cluster.mode | quote }}
  CLUSTER_BACKEND: {{ .Values.cluster.backend | quote }}

  MAX_CONNECTIONS: {{ .Values.limits.maxConnections | quote }}
  MAX_MESSAGE_SIZE_BYTES: {{ .Values.limits.maxMessageSizeBytes | quote }}
  PING_INTERVAL: {{ .Values.limits.pingInterval | quote }}
  PONG_TIMEOUT: {{ .Values.limits.pongTimeout | quote }}
  WRITE_TIMEOUT: {{ .Values.limits.writeTimeout | quote }}
  READ_TIMEOUT: {{ .Values.limits.readTimeout | quote }}

  CORS_ALLOWED_ORIGINS: {{ .Values.cors.allowedOrigins | quote }}
  MANAGEMENT_API_ENABLED: {{ .Values.managementApi.enabled | quote }}
