apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opensynccrdt.fullname" . }}
  labels:
    {{- include "opensynccrdt.labels" . | nindent 4 }}
type: Opaque
# Only non-empty values are rendered, so unset secrets stay unset in the engine.
stringData:
  {{- if .Values.storage.url }}
  STORAGE_URL: {{ .Values.storage.url | quote }}
  {{- end }}
  {{- if .Values.cluster.redisUrl }}
  CLUSTER_REDIS_URL: {{ .Values.cluster.redisUrl | quote }}
  {{- end }}
  {{- if .Values.webhooks.secret }}
  WEBHOOK_SECRET: {{ .Values.webhooks.secret | quote }}
  {{- end }}
  {{- if .Values.auth.webhookSecret }}
  AUTH_WEBHOOK_SECRET: {{ .Values.auth.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.conflictResolver.secret }}
  CONFLICT_RESOLVER_SECRET: {{ .Values.conflictResolver.secret | quote }}
  {{- end }}
  {{- if .Values.managementApi.key }}
  MANAGEMENT_API_KEY: {{ .Values.managementApi.key | quote }}
  {{- end }}
