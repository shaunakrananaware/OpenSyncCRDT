apiVersion: v1
kind: ConfigMap
metadata:
  name: opensynccrdt-config
  namespace: opensynccrdt
  labels:
    app.kubernetes.io/name: opensynccrdt
# Non-secret configuration. Secrets (STORAGE_URL with credentials, webhook
# secrets, management API key) live in the Secret, not here.
#
# This default is single-node SQLite. To run a Postgres-backed cluster:
#   - set STORAGE_BACKEND to "postgres"
#   - set CLUSTER_MODE to "true" and CLUSTER_BACKEND to "redis"
#   - move STORAGE_URL and CLUSTER_REDIS_URL into the Secret
#   - scale the Deployment past one replica and enable the HPA + Ingress affinity
data:
  HOST: "0.0.0.0"
  PORT: "8080"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  DATA_DIR: "/data"

  STORAGE_BACKEND: "sqlite"
  STORAGE_SNAPSHOT_INTERVAL: "100"

  AUTH_MODE: "none"

  CLUSTER_MODE: "false"
  CLUSTER_BACKEND: "redis"

  MAX_CONNECTIONS: "10000"
  MAX_MESSAGE_SIZE_BYTES: "1048576"
  PING_INTERVAL: "30s"
  PONG_TIMEOUT: "10s"

  CORS_ALLOWED_ORIGINS: "*"
  MANAGEMENT_API_ENABLED: "true"
