apiVersion: v1
kind: Secret
metadata:
  name: opensynccrdt-secret
  namespace: opensynccrdt
  labels:
    app.kubernetes.io/name: opensynccrdt
# TEMPLATE — do not commit real values. Fill these in (or generate the Secret
# from a secrets manager / sealed-secrets) before applying. Keys left empty are
# simply unset from the engine's point of view.
#
# stringData takes plain UTF-8 values; Kubernetes base64-encodes them for you.
type: Opaque
stringData:
  # Database connection string (Postgres/MySQL). Leave empty for SQLite.
  STORAGE_URL: ""

  # Redis connection string for cluster mode. Leave empty for single node.
  CLUSTER_REDIS_URL: ""

  # Shared HMAC signing secret for all outbound webhooks.
  WEBHOOK_SECRET: ""

  # Auth webhook (AUTH_MODE=webhook) signing secret.
  AUTH_WEBHOOK_SECRET: ""

  # Conflict resolver webhook signing secret.
  CONFLICT_RESOLVER_SECRET: ""

  # Bearer token required on /api/v1/ when set. Leave empty to disable auth on
  # the management API.
  MANAGEMENT_API_KEY: ""
