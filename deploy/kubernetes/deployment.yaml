apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensynccrdt
  namespace: opensynccrdt
  labels:
    app.kubernetes.io/name: opensynccrdt
spec:
  # Single replica for the default SQLite backend (single writer, RWO volume).
  # For a Postgres-backed cluster, raise this and enable the HPA; also set
  # CLUSTER_MODE=true so nodes fan out operations over Redis.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensynccrdt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensynccrdt
    spec:
      serviceAccountName: opensynccrdt
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: opensynccrdt
          image: opensynccrdt/server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: opensynccrdt-config
            - secretRef:
                name: opensynccrdt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opensynccrdt-data
