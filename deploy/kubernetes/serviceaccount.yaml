apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensynccrdt
  namespace: opensynccrdt
  labels:
    app.kubernetes.io/name: opensynccrdt
# The sync engine needs no Kubernetes API access; this dedicated account exists
# so pods do not run under the namespace default and so RBAC can be scoped to
# it later if needed.
automountServiceAccountToken: false
